<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: #0A0A0A;
    font-family: 'Noto Sans JP', sans-serif;
    color: #fff;
  }
  .frame {
    width: 1080px;
    height: 1350px;
    position: relative;
    padding: 135px 90px;
  }
  .top-line {
    width: 100%;
    height: 1px;
    background: #333;
  }
  .main {
    margin-top: 200px;
  }
  .l1 {
    font-size: 50px;
    color: #888;
    font-weight: 300;
    letter-spacing: 0.05em;
  }
  .l2 {
    font-size: 120px;
    color: #fff;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: 0.02em;
    margin-top: 6px;
  }
  .l3 {
    font-size: 55px;
    color: #fff;
    font-weight: 400;
    margin-top: 10px;
    letter-spacing: 0.03em;
  }
  .divider {
    width: 100%;
    height: 1px;
    background: #333;
    margin-top: 90px;
  }
  .features {
    margin-top: 55px;
    display: flex;
    justify-content: space-between;
    gap: 24px;
  }
  .feat {
    flex: 1;
    font-size: 26px;
    color: #fff;
    font-weight: 400;
    letter-spacing: 0.02em;
    line-height: 1.5;
    text-align: center;
  }
  .footer {
    position: absolute;
    bottom: 135px;
    left: 90px;
    right: 90px;
    text-align: center;
  }
  .cta {
    font-size: 28px;
    color: #888;
    letter-spacing: 0.06em;
    font-weight: 400;
  }
  .handle {
    font-size: 28px;
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-top: 14px;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="top-line"></div>
  <div class="main">
    <div class="l1">お仕事の</div>
    <div class="l2">依頼、</div>
    <div class="l3">受け付けています。</div>
  </div>
  <div class="divider"></div>
  <div class="features">
    <div class="feat">🎯<br>丁寧なヒアリング</div>
    <div class="feat">💻<br>コーディング専門</div>
    <div class="feat">⚡<br>スピード対応</div>
  </div>
  <div class="footer">
    <div class="cta">まずはDMでご相談ください</div>
    <div class="handle">@your_account</div>
  </div>
</div>
</body>
</html>
