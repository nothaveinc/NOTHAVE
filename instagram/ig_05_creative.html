<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Works.03 Creative</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: #0A0A0A;
    font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
    color: #fff;
  }
  .frame {
    width: 1080px;
    height: 1350px;
    position: relative;
    padding: 135px 90px;
  }
  .tag {
    color: #00FF94;
    font-size: 16px;
    letter-spacing: 0.3em;
    font-weight: 700;
    text-shadow: 0 0 10px rgba(0, 255, 148, 0.6);
  }
  .main {
    position: absolute;
    top: 50%;
    left: 90px;
    right: 90px;
    transform: translateY(-50%);
  }
  .void {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 900;
    font-size: 180px;
    line-height: 0.95;
    letter-spacing: -0.04em;
    color: #fff;
  }
  .creative {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 90px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: #00FF94;
    text-shadow: 0 0 20px rgba(0, 255, 148, 0.5);
    margin-top: 10px;
  }
  .glow-line {
    width: 220px;
    height: 1px;
    background: #00FF94;
    margin: 48px 0;
    box-shadow: 0 0 12px #00FF94, 0 0 24px rgba(0, 255, 148, 0.6);
  }
  .tags {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 24px;
    color: #888;
    letter-spacing: 0.05em;
  }
  .footer {
    position: absolute;
    bottom: 135px;
    right: 90px;
    color: #00FF94;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-shadow: 0 0 8px rgba(0, 255, 148, 0.5);
  }
  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    border-color: #00FF94;
    box-shadow: 0 0 10px rgba(0, 255, 148, 0.4);
  }
  .corner.tl { top: 90px; left: 60px; border-top: 1px solid; border-left: 1px solid; }
  .corner.br { bottom: 90px; right: 60px; border-bottom: 1px solid; border-right: 1px solid; }
</style>
</head>
<body>
<div class="frame">
  <div class="corner tl"></div>
  <div class="corner br"></div>
  <div class="tag">Works.03 ── CREATIVE</div>
  <div class="main">
    <div class="void">VOID</div>
    <div class="creative">CREATIVE</div>
    <div class="glow-line"></div>
    <div class="tags">Brand Identity ｜ Web Design ｜ Motion</div>
  </div>
  <div class="footer">Web制作 by K.</div>
</div>
</body>
</html>
