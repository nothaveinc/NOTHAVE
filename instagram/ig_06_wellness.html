<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Works.04 Wellness</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: #FAFAF8;
    font-family: 'Noto Sans JP', sans-serif;
    color: #2D3A2E;
  }
  .frame {
    width: 1080px;
    height: 1350px;
    position: relative;
    padding: 135px 100px;
  }
  .tag {
    color: #C9A96E;
    font-size: 18px;
    letter-spacing: 0.2em;
    font-weight: 700;
  }
  .vline {
    position: absolute;
    top: 260px;
    bottom: 260px;
    left: 90px;
    width: 1px;
    background: #C9A96E;
  }
  .main {
    position: absolute;
    top: 50%;
    left: 140px;
    right: 100px;
    transform: translateY(-50%);
  }
  .lumiere {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-style: italic;
    font-size: 110px;
    line-height: 1;
    color: #2D3A2E;
    letter-spacing: 0.01em;
  }
  .wellness {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 60px;
    color: #C9A96E;
    margin-top: 14px;
    letter-spacing: 0.02em;
  }
  .gold-line {
    width: 180px;
    height: 1px;
    background: #C9A96E;
    margin: 40px 0;
  }
  .sub {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 26px;
    color: #7A7A75;
    letter-spacing: 0.08em;
    font-weight: 400;
  }
  .features {
    position: absolute;
    bottom: 230px;
    left: 140px;
    right: 100px;
    display: flex;
    gap: 38px;
    font-size: 22px;
    color: #2D3A2E;
    letter-spacing: 0.05em;
  }
  .features span {
    border-top: 1px solid #C9A96E;
    padding-top: 14px;
  }
  .footer {
    position: absolute;
    bottom: 135px;
    right: 100px;
    color: #C9A96E;
    font-size: 18px;
    letter-spacing: 0.15em;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="tag">Works.04 ── Wellness</div>
  <div class="vline"></div>
  <div class="main">
    <div class="lumiere">LUMIÈRE</div>
    <div class="wellness">Wellness</div>
    <div class="gold-line"></div>
    <div class="sub">Pilates &amp; Wellness Studio</div>
  </div>
  <div class="features">
    <span>体験予約フォーム</span>
    <span>アニメーション</span>
    <span>レスポンシブ</span>
  </div>
  <div class="footer">Web制作 by K.</div>
</div>
</body>
</html>
